<!DOCTYPE html>
<html lang="en">

    <head>
        <title>Advanced Search</title>
        <link rel = "stylesheet" href = "style.css">
    </head>

    <body>
        
        <div class="shortcut">
            <a href="index.html" >Google Search</a>
        </div>


        <a href="index.html">
            <h1 class = "logo size-30">Google</h1>
        </a>

        <div >
            <form action="https://www.google.com/search" class="vertical_container start" id="advanced_search_form">
                <h2 class = "grey">Advanced Search</h2>
                <h3 class = "grey">Find pages with</h3>
                
                <div class = "vertical_container">
                    <div class = "horizontal_container between parent-width">
                        <label for ="all_words" class = "parent-width-20 grey">All of these words:</label>
                        <input type = "text" name = "as_q" id = "all_words" class = "clean parent-width-65">
                    </div>
                    
                    <div class = "horizontal_container between parent-width margin-top">
                        <label for ="exact_words" class = "parent-width-20 grey">This exact word or phrase:</label>
                        <input type = "text" name = "as_epq" id = "exact_words" class = "clean parent-width-65">
                    </div>
                    
                    <div class = "horizontal_container between parent-width margin-top">
                        <label for ="not_these_words" class = "parent-width-20 grey">None of these words:</label>
                        <input type = "text" name = "as_eq" id = "not_these_words" class = "clean parent-width-65">
                    </div>
                    
                    <div class = "horizontal_container between parent-width margin-top margin-bottom">
                        <label for ="site_domain" class = "parent-width-20 grey">Site or domain:</label>
                        <input type = "text" name = "as_sitesearch" id = "site_domain" class = "clean parent-width-65">
                    </div>
                </div>
                
                <div class = "vertical_container end parent-width">
                    <button form = "advanced_search_form" type="submit" class = "button_container rounded primary">
                        Advanced Search
                    </button>
                </div>

            </form>

        </div>

    </body>

</html>
